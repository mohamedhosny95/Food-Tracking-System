# Fly.io deployment config for Food Tracker Bot
# Deploy: fly launch (first time) or fly deploy (updates)
# Set secrets: fly secrets set TELEGRAM_BOT_TOKEN=... GEMINI_API_KEY=... etc.

app = "food-tracking-bot"
primary_region = "fra"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "60s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
